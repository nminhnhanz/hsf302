<!DOCTYPE html>
<html lang="en" th:fragment="page(title, customCss, customJs, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">DevBlog</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/svg+xml" th:href="@{/image/favicon.svg}">
    <link rel="alternate icon" th:href="@{/image/favicon.ico}">

    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:if="${customCss != null}" th:replace="${customCss}"></th:block>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<th:block th:replace="${content}"></th:block>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:if="${customJs != null}" th:replace="${customJs}"></th:block>
</body>
</html>
