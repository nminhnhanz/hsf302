<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">DevBlog</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-3">
<!--                    <li class="nav-item">-->
<!--                        <a class="nav-link" th:href="@{/}">Home</a>-->
<!--                    </li>-->
<!--                    <li class="nav-item">-->
<!--                        <a class="nav-link" th:href="@{/#about}">About</a>-->
<!--                    </li>-->

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Categories
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="c : ${categories}">
                                <a class="dropdown-item"
                                   th:href="@{/blogs(categoryId=${c.id})}"
                                   th:text="${c.name}">Category</a>
                            </li>
                        </ul>
                    </li>

<!--                    <li class="nav-item">-->
<!--                        <a class="nav-link" th:href="@{/blogs}">All posts</a>-->
<!--                    </li>-->
                </ul>

                <form class="d-flex me-auto" th:action="@{/blogs}" method="get">
                    <input class="form-control me-2" type="search" name="q" placeholder="Search blogs..." aria-label="Search"
                           th:value="${q} ?: ''">
                    <button class="btn btn-outline-primary" type="submit">Search</button>
                </form>

                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/login}">Login</a>
                    <a class="btn btn-primary btn-sm" th:href="@{/register}">Register</a>
                </div>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
