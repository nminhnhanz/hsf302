<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="header" class="sticky-top" style="z-index: 1050;">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">DevBlog</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Categories
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="c : ${categories}">
                                <a class="dropdown-item" th:href="@{/blogs(categoryId=${c.id})}" th:text="${c.name}">Category</a>
                            </li>
                        </ul>
                    </li>
                </ul>

                <form class="d-flex me-auto" th:action="@{/blogs}" method="get">
                    <input class="form-control me-2" type="search" name="q" placeholder="Search blogs..." aria-label="Search"
                           th:value="${q} ?: ''">
                    <button class="btn btn-outline-primary" type="submit">Search</button>
                </form>

                <div class="d-flex gap-2 align-items-center">
                    <th:block sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/authen/login}">Login</a>
                        <a class="btn btn-primary btn-sm" th:href="@{/authen/register}">Register</a>
                    </th:block>

                    <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                        <a class="nav-link position-relative" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-bell" style="font-size: 1.2rem;"></i>
                            <span id="notificationBadge"
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                  th:classappend="${headerUnreadCount > 0} ? '' : ' d-none'"
                                  th:text="${headerUnreadCount}">0</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="min-width: 320px; max-height: 360px; overflow: auto;">
                            <li class="dropdown-header">Notifications</li>
                            <li><hr class="dropdown-divider"></li>
                            <li id="notificationEmpty" class="px-3 py-2 text-muted small"
                                th:classappend="${headerNotifications != null and !headerNotifications.isEmpty()} ? ' d-none' : ''">No notifications yet</li>
                            <li>
                                <ul id="notificationList" class="list-unstyled mb-0">
                                    <li th:each="n : ${headerNotifications}">
                                        <a class="dropdown-item py-2"
                                           th:classappend="${n.read} ? ' text-muted' : (${n.type == 'ADMIN'} ? ' text-warning' : ' text-primary')"
                                           th:href="${n.articleId != null ? '/articles/' + n.articleId + (n.commentId != null ? '?focusCommentId=' + n.commentId : '') + '#comments' : '#'}"
                                           th:attr="data-notification-id=${n.id},data-read=${n.read}">
                                            <div class="small text-muted mb-1"
                                                 th:text="${'@' + n.actorUsername + (n.createdAt != null ? ' - ' + #temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm') : '')}">@user</div>
                                            <div class="small"><span class="fw-semibold">Notification:</span> <span th:text="${n.message}">Message</span></div>
                                            <div class="small text-muted"><span class="fw-semibold">Article:</span> <span th:text="${n.articleId != null ? 'Article #' + n.articleId : 'Unknown article'}">Article</span></div>
                                        </a>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>

                    <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center text-decoration-none" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="padding: 0;">
                            <img th:src="@{'https://ui-avatars.com/api/?name=' + ${#authentication.name} + '&background=2563eb&color=fff&size=36&bold=true&rounded=true'}"
                                 alt="Profile" class="rounded-circle me-2 shadow-sm" style="width: 36px; height: 36px;">
                            <span class="fw-semibold text-dark me-1" th:text="${#authentication.name}">Username</span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3" style="min-width: 220px; border-radius: 12px;">
                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item py-2" th:href="@{/admin/dashboard}">Dashboard</a>
                            </li>
                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item py-2" th:href="@{/admin/articles}">Manage Articles</a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger py-2" th:href="@{/authen/logout}">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</div>

<script th:inline="javascript" sec:authorize="isAuthenticated()">
    (function () {
        const notificationsApiUrl = /*[[@{/notifications/api}]]*/ '/notifications/api';
        const initialUnreadCount = /*[[${headerUnreadCount}]]*/ 0;
        const badge = document.getElementById('notificationBadge');
        const list = document.getElementById('notificationList');
        const empty = document.getElementById('notificationEmpty');
        let unreadCount = Number(initialUnreadCount) || 0;

        function updateBadge() {
            if (!badge) {
                return;
            }
            if (unreadCount > 0) {
                badge.textContent = String(unreadCount);
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
        }

        function destinationHref(payload) {
            if (!payload || !payload.articleId) {
                return '#';
            }
            const url = new URL(`/articles/${payload.articleId}`, window.location.origin);
            if (payload.commentId) {
                url.searchParams.set('focusCommentId', payload.commentId);
            }
            url.hash = 'comments';
            return url.pathname + url.search + url.hash;
        }

        function truncateText(value, maxLength) {
            const text = value || '';
            if (text.length <= maxLength) {
                return text;
            }
            return text.slice(0, Math.max(0, maxLength - 1)).trimEnd() + '...';
        }

        function parseNotificationContent(payload) {
            const fallbackMessage = 'You have a new notification';
            const rawMessage = payload && payload.message ? payload.message : fallbackMessage;
            const articleMatch = rawMessage.match(/(?:\bin\b|\bon\b)\s+'([^']+)'/i);
            const articleTitle = articleMatch && articleMatch[1]
                ? articleMatch[1]
                : (payload && payload.articleId ? `Article #${payload.articleId}` : 'Unknown article');

            let shortMessage = rawMessage;
            if (articleMatch && articleMatch.index > 0) {
                shortMessage = rawMessage.slice(0, articleMatch.index).trim();
            }

            if (!shortMessage) {
                shortMessage = fallbackMessage;
            }

            return {
                message: truncateText(shortMessage, 80),
                articleTitle: truncateText(articleTitle, 70)
            };
        }

        function formatCreatedAt(payload) {
            if (!payload || !payload.createdAt) {
                return '';
            }
            const date = new Date(payload.createdAt);
            if (Number.isNaN(date.getTime())) {
                return '';
            }
            return date.toLocaleString();
        }

        function renderNotification(payload, colorClass, prepend) {
            if (!list) return;
            if (empty) {
                empty.classList.add('d-none');
            }

            const li = document.createElement('li');
            const actor = payload && payload.actorUsername ? payload.actorUsername : 'Someone';
            const itemClass = payload && payload.read ? 'dropdown-item py-2 text-muted' : `dropdown-item py-2 ${colorClass}`;
            const notificationId = payload && payload.id ? payload.id : (payload && payload.notificationId ? payload.notificationId : '');
            if (notificationId) {
                const existing = list.querySelector(`a[data-notification-id="${notificationId}"]`);
                if (existing) {
                    return;
                }
            }
            const parsed = parseNotificationContent(payload);

            const anchor = document.createElement('a');
            anchor.className = itemClass;
            anchor.href = destinationHref(payload);
            anchor.setAttribute('data-notification-id', String(notificationId));
            anchor.setAttribute('data-read', String(!!(payload && payload.read)));

            const meta = document.createElement('div');
            meta.className = 'small text-muted mb-1';
            const createdAtText = formatCreatedAt(payload);
            meta.textContent = createdAtText ? `@${actor} - ${createdAtText}` : `@${actor}`;

            const messageLine = document.createElement('div');
            messageLine.className = 'small';
            messageLine.innerHTML = '<span class="fw-semibold">Notification:</span> ';
            messageLine.appendChild(document.createTextNode(parsed.message));

            const articleLine = document.createElement('div');
            articleLine.className = 'small text-muted';
            articleLine.innerHTML = '<span class="fw-semibold">Article:</span> ';
            articleLine.appendChild(document.createTextNode(parsed.articleTitle));

            anchor.appendChild(meta);
            anchor.appendChild(messageLine);
            anchor.appendChild(articleLine);
            li.appendChild(anchor);

            if (prepend) {
                list.prepend(li);
            } else {
                list.appendChild(li);
            }
        }

        function loadInitialNotifications() {
            fetch(notificationsApiUrl, {
                credentials: 'same-origin',
                headers: {
                    'Accept': 'application/json'
                }
            })
                .then(response => response.ok ? response.json() : Promise.reject(new Error('Load notifications failed')))
                .then(data => {
                    unreadCount = data && typeof data.unreadCount === 'number' ? data.unreadCount : 0;
                    updateBadge();
                    if (!list) {
                        return;
                    }
                    list.innerHTML = '';
                    const items = data && data.items ? data.items : [];
                    if (items.length === 0) {
                        if (empty) {
                            empty.classList.remove('d-none');
                        }
                        return;
                    }
                    items.forEach(item => {
                        const itemColor = item && item.type === 'ADMIN' ? 'text-warning' : 'text-primary';
                        renderNotification(item, itemColor, false);
                    });
                })
                .catch(err => console.warn('Notification bootstrap failed', err));
        }

        function markAsRead(notificationId) {
            if (!notificationId) {
                return Promise.resolve();
            }
            return fetch(`${notificationsApiUrl}/${notificationId}/read`, {
                method: 'POST',
                credentials: 'same-origin'
            })
                .then(response => response.ok ? response.json() : Promise.reject(new Error('Mark as read failed')))
                .then(data => {
                    unreadCount = data && typeof data.unreadCount === 'number' ? data.unreadCount : Math.max(0, unreadCount - 1);
                    updateBadge();
                    return data;
                })
                .catch(() => {
                    unreadCount = Math.max(0, unreadCount - 1);
                    updateBadge();
                    return null;
                });
        }

        function markNotificationItemAsRead(anchor) {
            if (!anchor) {
                return;
            }
            anchor.setAttribute('data-read', 'true');
            anchor.classList.add('text-muted');
            anchor.classList.remove('text-primary');
            anchor.classList.remove('text-warning');
        }

        function navigateToNotificationTarget(href) {
            if (!href || href === '#') {
                return;
            }

            const targetUrl = new URL(href, window.location.origin);
            const targetPath = targetUrl.pathname + targetUrl.search;
            const sameArticlePage = window.location.pathname === targetUrl.pathname;

            if (sameArticlePage && typeof window.hsfFocusCommentFromUrl === 'function') {
                const currentUrl = new URL(window.location.href);
                const targetFocusId = targetUrl.searchParams.get('focusCommentId');
                if (targetFocusId) {
                    currentUrl.searchParams.set('focusCommentId', targetFocusId);
                } else {
                    currentUrl.searchParams.delete('focusCommentId');
                }
                currentUrl.hash = targetUrl.hash || '#comments';
                window.history.replaceState({}, '', currentUrl.pathname + currentUrl.search + currentUrl.hash);
                window.hsfFocusCommentFromUrl();
                return;
            }

            window.location.href = targetPath + targetUrl.hash;
        }

        if (list) {
            list.addEventListener('click', function (event) {
                const target = event.target && event.target.closest ? event.target.closest('a[data-notification-id]') : null;
                if (!target) {
                    return;
                }
                const notificationId = target.getAttribute('data-notification-id');
                const href = target.getAttribute('href') || '#';
                const alreadyRead = target.getAttribute('data-read') === 'true';
                event.preventDefault();
                markAsRead(notificationId).finally(function () {
                    if (!alreadyRead) {
                        markNotificationItemAsRead(target);
                    }
                    navigateToNotificationTarget(href);
                });
            });
        }

        loadInitialNotifications();
        setInterval(loadInitialNotifications, 15000);
    })();
</script>
</body>
</html>
