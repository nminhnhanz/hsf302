<!DOCTYPE html>
<html th:replace="~{fragments/layout :: page(~{::title}, ~{::#customCss}, ~{::#customJs}, ~{::main})}" xmlns:th="http://www.thymeleaf.org"><head>
    <title>DevBlog - Software Engineering & Programming</title>
    <th:block id="customCss">
        <link rel="stylesheet" th:href="@{/css/index.css}">
    </th:block>
</head>
<body>

<main class="container my-5">
    <section id="about" class="hero p-4 p-md-5 mb-5 d-flex align-items-center">
        <div class="row w-100 align-items-center">
            <div class="col-lg-8 order-2 order-lg-1 mt-4 mt-lg-0 text-center text-lg-start">
                <span class="badge bg-primary mb-3 px-3 py-2 rounded-pill">Hi there, I'm a Developer 👋</span>
                <h1 class="display-5 fw-bold mb-3 text-dark">Writing about Code, Architecture, and Backend.</h1>
                <p class="text-muted-custom fs-5 mb-4" th:text="${'Join me on my journey exploring Java, Spring Boot, System Design, and the life of a Software Engineer.'}">
                    Author bio goes here.
                </p>
                <div class="d-flex gap-3 justify-content-center justify-content-lg-start align-items-center">
                    <a th:href="@{/blogs}" class="btn btn-dark px-4 py-2 rounded-pill fw-medium">Explore Articles</a>
                </div>
            </div>
            <div class="col-lg-4 order-1 order-lg-2 text-center">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=300&q=80" alt="Author Avatar" class="hero-avatar">
            </div>
        </div>
    </section>

    <section class="mb-5">
        <div class="d-flex flex-wrap gap-3 justify-content-center">
            <a th:each="c : ${topCategories}"
               th:href="@{/blogs(categoryId=${c.id})}"
               class="text-decoration-none category-pill"
               th:text="'🏷️ ' + ${c.name}">Category</a>
            <a th:href="@{/blogs}" class="text-decoration-none category-pill">📚 All Topics</a>
        </div>
    </section>

    <section class="mb-5">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h3 class="fw-bold mb-0">Latest posts</h3>
            <a th:href="@{/blogs}" class="text-decoration-none fw-medium text-primary">View all <i class="bi bi-arrow-right"></i></a>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="a : ${latestArticles}">
                <a class="text-decoration-none text-reset d-block h-100" th:href="@{/articles/{id}(id=${a.id})}" aria-label="View article">
                    <div class="post-card">
                        <img class="post-thumb" th:if="${a.thumbnail != null}" th:src="${a.thumbnail}" alt="thumbnail">
                        <div class="card-body-custom">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="badge badge-category rounded-pill" th:text="${a.category != null ? a.category.name : 'Uncategorized'}">Category</span>
                                <span class="small text-muted-custom" th:text="${#temporals.format(a.createdAt, 'MMM dd, yyyy')}">Oct 24, 2023</span>
                            </div>

                            <h5 class="fw-bold mb-2 text-dark line-clamp-2" th:text="${a.title}">Title</h5>
                            <p class="text-muted-custom mb-3 line-clamp-3 flex-grow-1" th:text="${a.summary}">Summary</p>

                            <div class="d-flex flex-wrap gap-2 mt-auto">
                                <span class="badge badge-tag rounded-pill px-2 py-1" th:each="t : ${a.tags}" th:text="'#' + ${t.name}">#tag</span>
                            </div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-12 text-center py-5 text-muted-custom" th:if="${latestArticles == null or latestArticles.isEmpty()}">
                <i class="bi bi-journal-x fs-1 mb-3 d-block"></i>
                <p>No articles published yet. Check back soon!</p>
            </div>
        </div>
    </section>
</main>
<th:block id="customJs"></th:block>
</body>
</html>
