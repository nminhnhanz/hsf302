<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - HSF News</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; border-radius: 12px; border: none; }
    </style>
</head>
<body>
    <main class="container auth-wrapper">
        <article class="card auth-card shadow-sm p-4">
            <header class="text-center mb-4">
                <h1 class="h3 fw-bold text-primary">Login</h1>
                <p class="text-muted">Welcome back to HSF News</p>
            </header>
            
            <section th:if="${errMsg}" class="alert alert-danger" role="alert" th:text="${errMsg}"></section>
            
            <form method="post">
                <fieldset class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <input type="text" id="username" name="username" th:value="${username}" class="form-control form-control-lg" th:classappend="${usernameError != null} ? 'is-invalid' : ''" placeholder="Enter your username" autofocus>
                    <div class="invalid-feedback fw-medium" th:if="${usernameError != null}" th:text="${usernameError}"></div>
                </fieldset>
                
                <fieldset class="mb-4">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" th:classappend="${passwordError != null} ? 'is-invalid' : ''" placeholder="Enter your password">
                    <div class="invalid-feedback fw-medium" th:if="${passwordError != null}" th:text="${passwordError}"></div>
                </fieldset>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 fw-bold">Login</button>
                
                <footer class="text-center mt-3">
                    <span class="text-muted">Don't have an account?</span> 
                    <a th:href="@{'/authen/register'}" class="text-decoration-none fw-semibold">Register here</a>
                </footer>
            </form>
        </article>
    </main>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
