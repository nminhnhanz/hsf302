<!DOCTYPE html>
<html th:replace="~{fragments/layout :: page(~{::title}, ~{::#customCss}, ~{::#customJs}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${article.title}">Article - DevBlog</title>
    <th:block id="customCss">
        <link rel="stylesheet" th:href="@{/css/article.css}">
    </th:block>
</head>
<body>

<main class="container my-5">
    <div class="row justify-content-center">

        <div class="col-lg-10 col-xl-8">

            <article class="article-shell mb-4">
                <header class="article-header">
                    <div class="article-meta">
                        <span class="badge bg-primary bg-opacity-10 text-primary" th:text="${article.category != null ? article.category.name : 'Uncategorized'}">Category</span>
                        <span class="dot">•</span>
                        <span th:text="${#temporals.format(article.createdAt, 'MMM dd, yyyy')}">Date</span>
                        <span class="dot">•</span>
                        <span>By <strong th:text="${article.author != null ? article.author.fullName : 'Admin'}">Author</strong></span>
                    </div>

                    <h1 class="article-title" th:text="${article.title}">Title</h1>
                    <p class="article-summary" th:text="${article.summary}">Summary</p>

                    <div class="article-tags" th:if="${article.tags != null}">
                        <span class="tag" th:each="t : ${article.tags}" th:text="'#' + ${t.name}">#tag</span>
                    </div>

                    <img class="article-thumb" th:if="${article.thumbnail != null}" th:src="${article.thumbnail}" alt="thumbnail">
                </header>

                <section class="article-content" th:utext="${article.content}">
                </section>
            </article>

            <section class="article-shell">
                <h4 class="fw-bold mb-4">Comments</h4>

                <form class="mb-5">
                    <textarea class="form-control mb-3 bg-light border-0" rows="3" placeholder="Write a comment..." style="border-radius: 12px; padding: 16px;"></textarea>
                    <div class="text-end">
                        <button type="button" class="btn btn-primary fw-medium px-4 rounded-pill">Post Comment</button>
                    </div>
                </form>

                <hr class="text-muted mb-4 opacity-25">

                <div th:if="${article.comments != null and !article.comments.isEmpty()}">
                    <div class="comment" th:each="c : ${article.comments}">
                        <div class="d-flex align-items-center mb-2">
                            <div class="avatar-circle me-3 text-white d-flex align-items-center justify-content-center fw-bold shadow-sm"
                                 th:text="${#strings.substring(c.authorName, 0, 1)}">A</div>
                            <div>
                                <div class="comment-author mb-0" th:text="${c.authorName}">Name</div>
                                <div class="comment-date" th:text="${#temporals.format(c.createdAt, 'MMM dd, yyyy HH:mm')}">Date</div>
                            </div>
                        </div>
                        <div class="comment-body ms-5 ps-1" th:text="${c.content}">Content</div>
                    </div>
                </div>

                <div th:if="${article.comments == null or article.comments.isEmpty()}" class="text-muted text-center py-5">
                    <i class="bi bi-chat-square-text fs-1 mb-3 d-block opacity-50"></i>
                    No comments yet. Be the first to share your thoughts!
                </div>
            </section>

        </div>
    </div>
</main>

<th:block id="customJs"></th:block>
</body>
</html>
