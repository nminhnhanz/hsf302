<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row g-3">
        <aside class="col-lg-3">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('tags')}"></div>
        </aside>
        <section class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Manage Tags</h3>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/tags}">
        <div class="col-md-8">
            <label for="tagSearchQ" class="form-label visually-hidden">Search tag name</label>
            <input id="tagSearchQ" class="form-control" name="q" th:value="${q}" placeholder="Search tag name...">
        </div>
        <input type="hidden" name="size" th:value="${size}">
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Search</button>
        </div>
        <div class="col-md-2 d-grid">
            <a class="btn btn-outline-secondary" th:href="@{/admin/tags(size=${size})}">Clear</a>
        </div>
    </form>

    <div class="card mb-4">
        <div class="card-header">Create Tag</div>
        <div class="card-body">
            <form class="row g-2" method="post" th:action="@{/admin/tags}">
                <input type="hidden" name="q" th:value="${q}">
                <input type="hidden" name="page" th:value="${tags.number}">
                <input type="hidden" name="size" th:value="${size}">
                <div class="col-md-10">
                    <label for="newTagName" class="form-label visually-hidden">Tag name</label>
                    <input id="newTagName" class="form-control" name="name" placeholder="Tag name" required>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-success" type="submit">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th style="width: 85%">Name</th>
                <th style="width: 15%">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${tags.content}">
                <td>
                    <label class="form-label visually-hidden" th:for="|name-${t.id}|">Tag name</label>
                    <input class="form-control" th:value="${t.name}" th:id="|name-${t.id}|">
                </td>
                <td>
                    <form class="d-inline" th:action="@{/admin/tags/{id}/update(id=${t.id})}" method="post"
                          th:onsubmit="|this.name.value=document.getElementById('name-${t.id}').value;|">
                        <input type="hidden" name="q" th:value="${q}">
                        <input type="hidden" name="page" th:value="${tags.number}">
                        <input type="hidden" name="size" th:value="${size}">
                        <input type="hidden" name="name">
                        <button class="btn btn-sm btn-primary" type="submit">Save</button>
                    </form>
                    <form class="d-inline" th:action="@{/admin/tags/{id}/delete(id=${t.id})}" method="post"
                          onsubmit="return confirm('Remove this tag? It will be unlinked from articles and articles stay intact.');">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

            <nav th:if="${tags.totalPages > 1}" class="mt-3">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${tags.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tags(page=${tags.number - 1},q=${q},size=${size})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, tags.totalPages - 1)}" th:classappend="${i == tags.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/tags(page=${i},q=${q},size=${size})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${tags.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tags(page=${tags.number + 1},q=${q},size=${size})}">Next</a>
                    </li>
                </ul>
            </nav>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
