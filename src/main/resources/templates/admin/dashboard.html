<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        .chart-box {
            height: 360px;
            padding: 12px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row g-3">
        <aside class="col-lg-3">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>
        </aside>

        <section class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Dashboard</h3>
                <small class="text-muted">Chart options</small>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="text-muted mb-1">Total Articles</h6>
                            <h2 class="mb-0" th:text="${dashboard.totalArticles}">0</h2>
                            <small class="text-muted d-block mt-2">
                                Published: <span th:text="${dashboard.publishedArticles}">0</span>
                                | Draft: <span th:text="${dashboard.draftArticles}">0</span>
                            </small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="text-muted mb-1">Total Comments</h6>
                            <h2 class="mb-0" th:text="${dashboard.totalComments}">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-lg-8">
                    <div class="card h-100">
                <div class="card-header">
                    <form class="row g-2 align-items-end" method="get" th:action="@{/admin/dashboard}">
                        <div class="col-md-4">
                            <label for="mode" class="form-label mb-1">Che do</label>
                            <select id="mode" name="mode" class="form-select">
                                <option value="YEAR" th:selected="${dashboard.selectedMode == 'YEAR'}">Theo nam (12 thang)</option>
                                <option value="RECENT_12_MONTHS" th:selected="${dashboard.selectedMode == 'RECENT_12_MONTHS'}">12 thang gan nhat</option>
                                <option value="COMPARE_YEARS" th:selected="${dashboard.selectedMode == 'COMPARE_YEARS'}">So sanh 2 nam</option>
                            </select>
                        </div>
                        <div class="col-md-3 js-year-box">
                            <label for="year" class="form-label mb-1">Nam</label>
                            <select id="year" name="year" class="form-select">
                                <option th:each="y : ${dashboard.availableYears}" th:value="${y}" th:text="${y}" th:selected="${y == dashboard.selectedYear}"></option>
                            </select>
                        </div>
                        <div class="col-md-2 js-compare-box">
                            <label for="compareYearA" class="form-label mb-1">Nam A</label>
                            <select id="compareYearA" name="compareYearA" class="form-select">
                                <option th:each="y : ${dashboard.availableYears}" th:value="${y}" th:text="${y}" th:selected="${y == dashboard.selectedCompareYearA}"></option>
                            </select>
                        </div>
                        <div class="col-md-2 js-compare-box">
                            <label for="compareYearB" class="form-label mb-1">Nam B</label>
                            <select id="compareYearB" name="compareYearB" class="form-select">
                                <option th:each="y : ${dashboard.availableYears}" th:value="${y}" th:text="${y}" th:selected="${y == dashboard.selectedCompareYearB}"></option>
                            </select>
                        </div>
                        <div class="col-md-1 d-grid">
                            <button type="submit" class="btn btn-primary">Ap dung</button>
                        </div>
                    </form>
                </div>
                <div class="card-body chart-box">
                    <canvas id="timelineChart" aria-label="Article timeline chart"></canvas>
                </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card h-100">
                        <div class="card-header">Article Status Split</div>
                        <div class="card-body chart-box" style="height: 320px;">
                            <canvas id="statusPieChart" aria-label="Article status pie chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Top 5 Most Commented Articles</div>
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>Article</th>
                            <th class="text-end">Comments</th>
                            <th class="text-end">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(dashboard.topCommentedArticles)}">
                            <td colspan="3" class="text-center text-muted">No data</td>
                        </tr>
                        <tr th:each="item : ${dashboard.topCommentedArticles}">
                            <td th:text="${item.title}"></td>
                            <td class="text-end" th:text="${item.commentCount}"></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/articles/edit/{id}(id=${item.id})}">Open</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    function renderMonthlyChart(canvasId, labels, primaryValues, primaryLabel, secondaryValues, secondaryLabel) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        if (!labels || labels.length === 0) {
            const ctx = canvas.getContext("2d");
            ctx.font = "14px sans-serif";
            ctx.fillStyle = "#6c757d";
            ctx.textAlign = "center";
            ctx.fillText("No data", canvas.width / 2, canvas.height / 2);
            return;
        }

        const datasets = [{
            label: primaryLabel || "Series A",
            data: primaryValues,
            borderWidth: 1,
            borderColor: "rgba(37, 99, 235, 1)",
            backgroundColor: "rgba(37, 99, 235, 0.55)"
        }];

        if (secondaryValues && secondaryValues.length > 0) {
            datasets.push({
                label: secondaryLabel || "Series B",
                data: secondaryValues,
                borderWidth: 1,
                borderColor: "rgba(245, 158, 11, 1)",
                backgroundColor: "rgba(245, 158, 11, 0.55)"
            });
        }

        new Chart(canvas, {
            type: "bar",
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: datasets.length > 1 }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0 }
                    },
                    x: {
                        ticks: { maxRotation: 45, minRotation: 0 }
                    }
                }
            }
        });
    }

    function renderStatusPieChart(canvasId, published, draft) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        new Chart(canvas, {
            type: "pie",
            data: {
                labels: ["Published", "Draft"],
                datasets: [{
                    data: [published, draft],
                    backgroundColor: ["rgba(34, 197, 94, 0.8)", "rgba(148, 163, 184, 0.8)"],
                    borderColor: ["rgba(22, 163, 74, 1)", "rgba(100, 116, 139, 1)"],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "bottom" }
                }
            }
        });
    }

    const labels = /*[[${dashboard.labels}]]*/ [];
    const primaryValues = /*[[${dashboard.primarySeries}]]*/ [];
    const primaryLabel = /*[[${dashboard.primarySeriesLabel}]]*/ "";
    const secondaryValues = /*[[${dashboard.secondarySeries}]]*/ [];
    const secondaryLabel = /*[[${dashboard.secondarySeriesLabel}]]*/ "";
    const publishedArticles = /*[[${dashboard.publishedArticles}]]*/ 0;
    const draftArticles = /*[[${dashboard.draftArticles}]]*/ 0;

    renderMonthlyChart("timelineChart", labels, primaryValues, primaryLabel, secondaryValues, secondaryLabel);
    renderStatusPieChart("statusPieChart", publishedArticles, draftArticles);

    const modeSelect = document.getElementById("mode");
    const yearBox = document.querySelector(".js-year-box");
    const compareBoxes = document.querySelectorAll(".js-compare-box");

    function updateFilterVisibility() {
        const mode = modeSelect ? modeSelect.value : "YEAR";
        const isCompare = mode === "COMPARE_YEARS";
        const isYear = mode === "YEAR";

        if (yearBox) {
            yearBox.classList.toggle("d-none", !isYear);
        }

        compareBoxes.forEach(el => {
            el.classList.toggle("d-none", !isCompare);
        });
    }

    if (modeSelect) {
        modeSelect.addEventListener("change", updateFilterVisibility);
    }
    updateFilterVisibility();
</script>
</body>
</html>
