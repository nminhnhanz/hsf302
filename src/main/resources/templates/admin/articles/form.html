<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.id == null ? 'Create Article' : 'Edit Article'}">Article Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h3 th:text="${article.id == null ? 'Create New Article' : 'Edit Article'}">Article Form</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{__${article.id == null ? '/admin/articles/new' : '/admin/articles/edit/' + article.id}__}" 
                              method="post" enctype="multipart/form-data" th:object="${article}">
                            
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="summary" class="form-label">Summary</label>
                                <textarea class="form-control" id="summary" th:field="*{summary}" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="content" class="form-label">Content</label>
                                <textarea id="content" th:field="*{content}"></textarea>
                                <div class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="thumbnailFile" class="form-label">Thumbnail Image</label>
                                <input type="file" class="form-control" id="thumbnailFile" name="thumbnailFile" 
                                       accept="image/*">
                                <div th:if="${article.thumbnail}" class="mt-2">
                                    <img th:src="${article.thumbnail}" alt="Current thumbnail" class="img-thumbnail" style="max-height: 100px;">
                                    <small class="d-block text-muted">Current thumbnail</small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-control" id="category" th:field="*{category}">
                                    <option value="">Select Category</option>
                                    <option th:each="cat : ${categories}" 
                                            th:value="${cat.id}" 
                                            th:text="${cat.name}"
                                            th:selected="${article.category != null and article.category.id == cat.id}">Category</option>
                                </select>
                                <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="tags" class="form-label">Tags</label>
                                <input type="text" class="form-control" id="tags" name="tags" 
                                       placeholder="Enter tags separated by commas">
                                <small class="form-text text-muted">Separate tags with commas</small>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/admin/articles" class="btn btn-secondary">Cancel</a>
                                <div>
                                    <button type="submit" name="action" value="draft" class="btn btn-outline-secondary">Save as Draft</button>
                                    <button type="submit" name="action" value="publish" class="btn btn-primary">Publish</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#content').summernote({
                height: 300,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'italic', 'underline', 'clear']],
                    ['fontname', ['fontname']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });
    </script>
</body>
</html>
