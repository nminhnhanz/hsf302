<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.id == null ? 'Create Article' : 'Edit Article'}">Article Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">

    <style>
        .typeahead { position: relative; }
        .suggestions { position: absolute; z-index: 20; width: 100%; background: #fff; border: 1px solid #eee; border-radius: 10px; margin-top: 6px; max-height: 260px; overflow: auto; box-shadow: 0 12px 30px rgba(0,0,0,.08); }
        .suggestions button { width: 100%; text-align: left; border: 0; background: transparent; padding: 10px 12px; }
        .suggestions button:hover { background: #f6f7fb; }
        .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; border: 1px solid #eee; background: #fff; }
        .chip .x { border: 0; background: transparent; line-height: 1; font-size: 16px; padding: 0 4px; }
        .note-editor.note-frame.fullscreen {
            background-color: #ffffff !important;
            z-index: 9999 !important;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${article.id == null ? 'Create New Article' : 'Edit Article'}">Article Form</h3>
                </div>
                <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form id="articleForm" th:action="@{__${article.id == null ? '/admin/articles/new' : '/admin/articles/edit/' + article.id}__}"
                          method="post" enctype="multipart/form-data" th:object="${article}">

                        <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
                            <ul class="mb-0">
                                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Current Status</label>
                            <div>
                                <span class="badge bg-success" th:if="${article.status != null and article.status.name() == 'PUBLISHED'}">Published</span>
                                <span class="badge bg-secondary" th:if="${article.status != null and article.status.name() == 'DRAFT'}">Draft</span>
                                <span class="badge bg-dark" th:if="${article.status == null}">Not set yet</span>
                            </div>
                            <small class="text-muted">Use Publish or Save as Draft button to set status.</small>
                        </div>

                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="summary" class="form-label">Summary</label>
                            <textarea class="form-control" id="summary" th:field="*{summary}" rows="3"></textarea>
                            <div class="text-danger" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label">Content</label>
                            <textarea id="content" th:field="*{content}" class="d-none"></textarea>
                            <div class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="thumbnailFile" class="form-label">Thumbnail Image</label>
                            <input type="file" class="form-control" id="thumbnailFile" name="thumbnailFile"
                                   accept="image/*">
                            <div th:if="${article.thumbnail}" class="mt-2">
                                <img th:src="${article.thumbnail}" alt="Current thumbnail" class="img-thumbnail" style="max-height: 100px;">
                                <small class="d-block text-muted">Current thumbnail</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category <span class="text-danger">*</span></label>
                            <div class="typeahead">
                                <label for="categoryInput" class="form-label visually-hidden">Search category</label>
                                <input id="categoryInput" type="search" class="form-control" placeholder="Search category..." autocomplete="off">
                                <div id="categorySuggestions" class="suggestions d-none"></div>
                            </div>
                            <input type="hidden" name="categoryId" id="categoryHidden" th:value="${article.category != null ? article.category.id : ''}">
                            <input type="hidden" name="newCategoryName" id="newCategoryNameHidden" value="">
                            <input type="hidden" id="initialCategoryName" th:value="${article.category != null ? article.category.name : ''}">
                            <div id="categorySelected" class="mt-2"></div>
                            <div id="categoryClientError" class="text-danger mt-1 d-none">Category is required.</div>
                            <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tags (up to 5)</label>
                            <div class="typeahead">
                                <label for="tagInput" class="form-label visually-hidden">Search tags</label>
                                <input id="tagInput" type="search" class="form-control" placeholder="Search tags..." autocomplete="off">
                                <div id="tagSuggestions" class="suggestions d-none"></div>
                            </div>
                            <input type="hidden" name="tagIds" id="tagsHidden" value="">
                            <input type="hidden" name="newTagNames" id="newTagNamesHidden" value="">
                            <div id="initialTagsData" class="d-none">
                                <span th:if="${article.tags != null}" th:each="t : ${article.tags}" th:attr="data-id=${t.id},data-name=${t.name}"></span>
                            </div>
                            <div id="tagsSelected" class="d-flex flex-wrap gap-2 mt-2"></div>
                            <small class="form-text text-muted">Select up to 5 tags.</small>
                            <div class="text-danger" th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin/articles" class="btn btn-secondary">Cancel</a>
                            <div>
                                <button type="submit" name="action" value="draft" class="btn btn-outline-secondary">Save as Draft</button>
                                <button type="submit" name="action" value="publish" class="btn btn-primary">Publish</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

<script>
    (function () {
        const key = 'articleFormDraft';
        const raw = sessionStorage.getItem(key);
        if (!raw) return;

        try {
            const draft = JSON.parse(raw);
            if (draft.title != null) document.getElementById('title').value = draft.title;
            if (draft.summary != null) document.getElementById('summary').value = draft.summary;
            if (draft.content != null) document.getElementById('content').value = draft.content;
            if (draft.categoryId != null) document.getElementById('categoryHidden').value = draft.categoryId;
            if (draft.newCategoryName != null) document.getElementById('newCategoryNameHidden').value = draft.newCategoryName;
            if (draft.categoryName != null) document.getElementById('initialCategoryName').value = draft.categoryName;
            if (draft.tagIds != null) document.getElementById('tagsHidden').value = draft.tagIds;
            if (draft.newTagNames != null) document.getElementById('newTagNamesHidden').value = draft.newTagNames;
        } catch (e) {
            sessionStorage.removeItem(key);
        }
    })();
</script>

<script th:src="@{/js/article-form-search.js}"></script>

<script>
    $(document).ready(function() {
        const storageKey = 'articleFormDraft';
        const form = document.getElementById('articleForm');
        const MAX_EDITOR_IMAGE_BYTES = 2 * 1024 * 1024;

        function getEditorContentWidth() {
            const editable = document.querySelector('.note-editor .note-editable');
            return editable && editable.clientWidth > 0 ? Math.floor(editable.clientWidth) : 900;
        }

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error('Cannot read image file.'));
                reader.readAsDataURL(file);
            });
        }

        function resizeImageForContent(file, maxWidth) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const shouldResize = img.width > maxWidth;
                        if (!shouldResize) {
                            resolve(e.target.result);
                            return;
                        }

                        const ratio = maxWidth / img.width;
                        const targetWidth = Math.floor(img.width * ratio);
                        const targetHeight = Math.floor(img.height * ratio);
                        const canvas = document.createElement('canvas');
                        canvas.width = targetWidth;
                        canvas.height = targetHeight;

                        const ctx = canvas.getContext('2d');
                        if (!ctx) {
                            reject(new Error('Cannot process image.'));
                            return;
                        }

                        ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                        const outputType = /^image\/(png|jpeg|webp)$/i.test(file.type) ? file.type : 'image/jpeg';
                        resolve(canvas.toDataURL(outputType, 0.9));
                    };
                    img.onerror = () => reject(new Error('Invalid image data.'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Cannot read image file.'));
                reader.readAsDataURL(file);
            });
        }

        function insertEditorImage(dataUrl, fileName) {
            const img = document.createElement('img');
            img.src = dataUrl;
            img.alt = fileName || 'article-image';
            img.style.maxWidth = '100%';
            img.style.height = 'auto';
            $('#content').summernote('insertNode', img);
        }

        function saveDraft() {
            const payload = {
                title: document.getElementById('title')?.value || '',
                summary: document.getElementById('summary')?.value || '',
                content: $('#content').summernote('code'),
                categoryId: document.getElementById('categoryHidden')?.value || '',
                categoryName: document.getElementById('initialCategoryName')?.value || '',
                newCategoryName: document.getElementById('newCategoryNameHidden')?.value || '',
                tagIds: document.getElementById('tagsHidden')?.value || '',
                newTagNames: document.getElementById('newTagNamesHidden')?.value || ''
            };
            sessionStorage.setItem(storageKey, JSON.stringify(payload));
        }

        $('#content').summernote({
            height: 300,
            styleTags: ['p', 'h2', 'h3', 'h4', 'h5'],
            toolbar: [
                ['style', ['style']],
                ['font', ['bold', 'italic', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ],
            callbacks: {
                onImageUpload: async function (files) {
                    const overSize = Array.from(files).find(f => f.size > MAX_EDITOR_IMAGE_BYTES);
                    if (overSize) {
                        alert('Each editor image must be 2MB or smaller.');
                        return;
                    }

                    const maxWidth = getEditorContentWidth();
                    for (const file of Array.from(files)) {
                        try {
                            const dataUrl = await resizeImageForContent(file, maxWidth);
                            insertEditorImage(dataUrl, file.name);
                            saveDraft();
                        } catch (err) {
                            const fallback = await readFileAsDataUrl(file);
                            insertEditorImage(fallback, file.name);
                            saveDraft();
                        }
                    }
                }
            }
        });

        form?.addEventListener('input', saveDraft);
        form?.addEventListener('change', saveDraft);
        $('#content').on('summernote.change', saveDraft);
        const categoryHidden = document.getElementById('categoryHidden');
        const newCategoryNameHidden = document.getElementById('newCategoryNameHidden');
        const categoryClientError = document.getElementById('categoryClientError');
        [categoryHidden, newCategoryNameHidden].forEach(el => {
            el?.addEventListener('change', function () {
                if ((categoryHidden?.value || '').trim() || (newCategoryNameHidden?.value || '').trim()) {
                    categoryClientError?.classList.add('d-none');
                }
            });
        });
        form?.addEventListener('submit', function (e) {
            const categoryId = document.getElementById('categoryHidden')?.value?.trim() || '';
            const newCategoryName = document.getElementById('newCategoryNameHidden')?.value?.trim() || '';

            if (!categoryId && !newCategoryName) {
                e.preventDefault();
                if (categoryClientError) {
                    categoryClientError.classList.remove('d-none');
                }
                const categoryInput = document.getElementById('categoryInput');
                if (categoryInput) {
                    categoryInput.focus();
                }
                return;
            }

            if (categoryClientError) {
                categoryClientError.classList.add('d-none');
            }
            saveDraft();
        });
    });
</script>
</body>
</html>
