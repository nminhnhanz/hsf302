<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row g-3">
        <aside class="col-lg-3">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('articles')}"></div>
        </aside>

        <section class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>My Articles</h2>
                <a th:href="@{/admin/articles/new}" class="btn btn-primary">Create New Article</a>
            </div>

            <div th:if="${message}" class="alert alert-success">
                <span th:text="${message}">Success message</span>
            </div>

            <form class="row g-2 mb-3" method="get" th:action="@{/admin/articles}">
                <div class="col-md-5">
                    <input class="form-control" name="q" th:value="${q}" placeholder="Search title or summary...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="" th:selected="${status == ''}">All Status</option>
                        <option value="PUBLISHED" th:selected="${status == 'PUBLISHED'}">Published</option>
                        <option value="DRAFT" th:selected="${status == 'DRAFT'}">Draft</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="categoryId">
                        <option value="" th:selected="${categoryId == null}">All Categories</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${categoryId != null and categoryId == c.id}">Category</option>
                    </select>
                </div>
                <input type="hidden" name="size" th:value="${size != null ? size : 10}">
                <div class="col-md-1 d-grid">
                    <button type="submit" class="btn btn-primary">Filter</button>
                </div>
                <div class="col-md-1 d-grid">
                    <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${articles == null or articles.content == null or articles.content.isEmpty()}">
                        <td colspan="4" class="text-center text-muted py-4">No articles found.</td>
                    </tr>
                    <tr th:each="article : ${articles.content}">
                        <td th:text="${article.title}">Title</td>
                        <td>
                            <span th:if="${article.status != null and article.status.name() == 'PUBLISHED'}" class="badge bg-success">Published</span>
                            <span th:if="${article.status != null and article.status.name() == 'DRAFT'}" class="badge bg-secondary">Draft</span>
                            <span th:if="${article.status == null}" class="badge bg-dark">Unknown</span>
                        </td>
                        <td th:text="${article.createdAt != null ? #temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                        <td class="text-nowrap">
                            <a th:href="@{/admin/articles/edit/{id}(id=${article.id})}" class="btn btn-sm btn-outline-primary">Edit</a>

                            <form th:if="${article.status != null and article.status.name() == 'DRAFT'}"
                                  th:action="@{/admin/articles/publish/{id}(id=${article.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-success">Publish</button>
                            </form>

                            <form th:if="${article.status != null and article.status.name() == 'PUBLISHED'}"
                                  th:action="@{/admin/articles/draft/{id}(id=${article.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-warning">Set Draft</button>
                            </form>

                            <form th:action="@{/admin/articles/delete/{id}(id=${article.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this article?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${articles != null and articles.totalPages > 0}">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${articles.number == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/articles(page=${articles.number - 1},q=${q},status=${status},categoryId=${categoryId},tagIds=${tagIds != null ? #strings.listJoin(tagIds, ',') : ''},size=${size})}">Previous</a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}"
                        th:classappend="${articles.number == i} ? 'active'">
                        <a class="page-link"
                           th:href="@{/admin/articles(page=${i},q=${q},status=${status},categoryId=${categoryId},tagIds=${tagIds != null ? #strings.listJoin(tagIds, ',') : ''},size=${size})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${articles.number == articles.totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/articles(page=${articles.number + 1},q=${q},status=${status},categoryId=${categoryId},tagIds=${tagIds != null ? #strings.listJoin(tagIds, ',') : ''},size=${size})}">Next</a>
                    </li>
                </ul>
            </nav>
        </section>
    </div>
</div>

<script th:src="@{/js/admin-articles-filter.js}"></script>
<script>
    sessionStorage.removeItem('articleFormDraft');
</script>
</body>
</html>
