<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>My Articles</h2>
            <a href="/admin/articles/new" class="btn btn-primary">Create New Article</a>
        </div>

        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="article : ${articles.content}">
                        <td th:text="${article.title}"></td>
                        <td>
                            <span th:if="${article.status == 'PUBLISHED'}" class="badge bg-success">Published</span>
                            <span th:if="${article.status == 'DRAFT'}" class="badge bg-secondary">Draft</span>
                        </td>
                        <td th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/admin/articles/edit/{id}(id=${article.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            
                            <form th:if="${article.status == 'DRAFT'}" th:action="@{/admin/articles/publish/{id}(id=${article.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-outline-success">Publish</button>
                            </form>
                            
                            <form th:if="${article.status == 'PUBLISHED'}" th:action="@{/admin/articles/draft/{id}(id=${article.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-outline-warning">Set Draft</button>
                            </form>
                            
                            <form th:action="@{/admin/articles/delete/{id}(id=${article.id})}" method="post" style="display: inline;" 
                                  onsubmit="return confirm('Are you sure you want to delete this article?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${articles.totalPages > 0}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${articles.number == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${articles.number - 1})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}" 
                    th:classappend="${articles.number == i} ? 'active'">
                    <a class="page-link" th:href="@{/admin/articles(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${articles.number == articles.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${articles.number + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
