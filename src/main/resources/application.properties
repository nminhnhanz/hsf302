spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=project;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123456}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.application.name=HSFNEWS


spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

app.seed-demo-data=${SEED_DEMO_DATA:true}

spring.jpa.properties.hibernate.default_batch_fetch_size=16

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html